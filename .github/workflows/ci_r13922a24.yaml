name: CI (r13922a24)

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so only the latest commit's CI matters.
concurrency:
  group: ci-r13922a24-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npm run typecheck

  prettier:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run prettier --check
        run: npm run format:check

  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with JUnit reporter
        run: |
          mkdir -p reports
          npm test -- \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=reports/vitest-junit.xml

      # Surfaces a per-test pass/fail breakdown directly on the run summary page.
      - name: Publish test results to run summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: reports/vitest-junit.xml
          check_name: Vitest results
          require_tests: true
          detailed_summary: true
          include_passed: true

      - name: Upload JUnit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: reports/
          if-no-files-found: error
          retention-days: 14

  ci-status:
    name: CI status
    needs: [typecheck, prettier, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        run: |
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "prettier=${{ needs.prettier.result }}"
          echo "test=${{ needs.test.result }}"
          if [ "${{ needs.typecheck.result }}" != "success" ] \
             || [ "${{ needs.prettier.result }}" != "success" ] \
             || [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::One or more required CI checks failed"
            exit 1
          fi
          echo "All required checks passed."
